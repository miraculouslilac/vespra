* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#050f0f; font-family:'DM Sans',sans-serif; color:#e8f5f5; overflow:hidden; }
#root { height:100%; }
::-webkit-scrollbar { width:0; height:0; }
textarea { resize:none; outline:none; border:none; font-family:'DM Sans',sans-serif; }
button, input { font-family:'DM Sans',sans-serif; outline:none; -webkit-appearance:none; }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fillBar { from{width:0} }
@keyframes scoreCount { from{opacity:0} to{opacity:1} }
@keyframes pulse1 { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.4);opacity:.15} }
@keyframes pulse2 { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.7);opacity:.1} }
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes dotBounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

.fade-up { animation:fadeUp .3s ease forwards; }
.bar-fill { animation:fillBar 1s ease-out forwards; }
.msg-in { animation:msgIn .25s ease forwards; }
</style>

// --- GitHub Chat History Sync ---
async function loadChatFromGitHub() {
  try {
    const res = await fetch(CHAT_HISTORY_URL + '?t=' + Date.now());
    if (!res.ok) return null;
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) return data;
    return null;
  } catch(e) { console.warn('GitHub chat load failed:', e); return null; }
}

async function saveChatToGitHub(messages) {
  try {
    // Get current SHA
    const metaRes = await fetch(GH_API_CHAT, {
      headers: { 'Authorization': 'token ' + GH_TOKEN }
    });
    let sha = null;
    if (metaRes.ok) {
      const meta = await metaRes.json();
      sha = meta.sha;
    }
    // Prepare content
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2))));
    const body = { message: 'Update chat history', content: content, branch: 'main' };
    if (sha) body.sha = sha;
    // PUT to GitHub
    const putRes = await fetch(GH_API_CHAT, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) console.warn('GitHub chat save failed:', putRes.status);
  } catch(e) { console.warn('GitHub chat save error:', e); }
}

async function clearChatOnGitHub() {
  try {
    const metaRes = await fetch(GH_API_CHAT, {
      headers: { 'Authorization': 'token ' + GH_TOKEN }
    });
    if (!metaRes.ok) return;
    const meta = await metaRes.json();
    const content = btoa('[]');
    await fetch(GH_API_CHAT, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Clear chat history', content: content, sha: meta.sha, branch: 'main' })
    });
  } catch(e) { console.warn('GitHub chat clear error:', e); }
}

const SESSION_ID = (() => {
  let id = localStorage.getItem(SESSION_KEY);
  if (!id) { id = "vespra-" + Math.random().toString(36).slice(2,9); localStorage.setItem(SESSION_KEY, id); }

  { key:"blood", name:"Кровь и иммунитет", score:null, color:C.gray, icon:"ti-shield", markers:[] },
  { key:"thyroid", name:"Щитовидная железа", score:null, color:C.gray, icon:"ti-atom", markers:[] },
  { key:"hormones", name:"Гормоны", score:null, color:C.gray, icon:"ti-flask", markers:[] },
  { key:"metabolism", name:"Метаболизм и энергия", score:null, color:C.gray, icon:"ti-fire", markers:[] },

function getScoringData() {
  try {
    const saved = localStorage.getItem(SCORING_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function useScoringData() {
  const [scoring, setScoring] = React.useState(getScoringData);
  React.useEffect(() => {
    // Fetch from GitHub raw (bypasses Vercel cache)
    fetch(SCORING_REPO_URL + '?t=' + Date.now())
      .then(r => { if (r.ok) return r.json(); throw new Error('not found'); })
      .then(data => {
        localStorage.setItem(SCORING_KEY, JSON.stringify(data));
        setScoring(data);
      })
      .catch(() => {
        // Fallback to local file
        fetch('scoring_data.json?t=' + Date.now())
          .then(r => { if (r.ok) return r.json(); throw new Error('not found'); })
          .then(data => {
            localStorage.setItem(SCORING_KEY, JSON.stringify(data));
            setScoring(data);
          })
          .catch(() => {});
      });
  }, []);
  return scoring;
}

function scoreColor(score) {
  if (score === null || score === undefined) return C.gray;
  if (score >= 80) return C.green;
  if (score >= 50) return C.yellow;
  return C.redScore;
}

function scoreGrad(score) {
  const color = scoreColor(score);
  if (color === C.green) return [C.teal3, C.teal];
  if (color === C.yellow) return [C.amber2, C.amber];
  if (color === C.redScore) return [C.red2, C.red];
  return [C.text5, C.text4];
}

function scoreLabel(score) {
  if (score === null || score === undefined) return "Нет данных";
  if (score >= 80) return "Отличный уровень";
  if (score >= 65) return "Хороший уровень";
  if (score >= 50) return "Средний уровень";
  return "Низкий уровень";
}

function markerStatus(icon) {
  if (icon === "✓") return "норма";
  if (icon === "⚠") return "внимание";
  if (icon === "✗") return "отклонение";
  return "нет данных";
}

function statusColor(s) {
  if (s==="норма") return C.green;
  if (s==="внимание") return C.yellow;
  if (s==="отклонение") return C.redScore;
  return C.gray;
}

function ScoreRing({score}) {
  const [disp, setDisp] = React.useState(0);
  const hasScore = score !== null && score !== undefined;
  React.useEffect(()=>{
    if (!hasScore) { setDisp(0); return; }
    let start=null, dur=1200;
    const step=(ts)=>{
      if(!start)start=ts;
      const p=Math.min((ts-start)/dur,1);
      setDisp(Math.round(score*p));
      if(p<1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },[score]);
  const pct = hasScore ? score : 0;
  const r=54, circ=2*Math.PI*r;
  const color = scoreColor(score);
  const grad = scoreGrad(score);
  return (
    <div style={{textAlign:"center",padding:"16px 0 12px"}}>
      <svg width="140" height="140" style={{transform:"rotate(-90deg)"}}>
        <circle cx="70" cy="70" r={r} fill="none" stroke={C.card2} strokeWidth="10"/>
        {hasScore && <circle cx="70" cy="70" r={r} fill="none" stroke={color} strokeWidth="10"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 1.2s ease"}}/>}
      </svg>
      <div style={{marginTop:-95,marginBottom:55,fontSize:38,fontWeight:700,color:hasScore?color:C.text5}}>
        {hasScore ? disp : "—"}
      </div>
      <div style={{fontSize:11,color:C.text4,marginTop:4}}>{scoreLabel(score)}</div>
    </div>
  );
}

}

function ChatTab() {
  const defaultMsg = [{role:"assistant",content:"Привет! Я Vespra 👋\nТвой персональный агент здоровья. Расскажи как себя чувствуешь, или скинь анализы, фото еды, тренировки — я всё проанализирую."}];
  const [msgs, setMsgs] = React.useState(() => {
    try { const saved = localStorage.getItem(STORAGE_KEY); return saved ? JSON.parse(saved) : defaultMsg; }
    catch(e) { return defaultMsg; }
  });
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [file, setFile] = React.useState(null);
  const endRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const textRef = React.useRef(null);
  const ghLoaded = React.useRef(false);
  React.useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);
  React.useEffect(()=>{ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs)); } catch(e){} },[msgs]);

  // Load chat from GitHub on mount (source of truth)
  React.useEffect(() => {
    if (ghLoaded.current) return;
    ghLoaded.current = true;
    loadChatFromGitHub().then(data => {
      if (data && data.length > 0) {
        setMsgs(data);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
      }
    });
  }, []);

  const clearChat = () => {
    setMsgs(defaultMsg);
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(SESSION_KEY);
    clearChatOnGitHub();
    window.location.reload();
  };

  const send = async() => {
    const txt = input.trim();
    if (!txt && !file) return;
    setMsgs(p=>[...p,{role:"user",content:file?`📎 ${file.name}${txt?" — "+txt:""}`:txt, timestamp: new Date().toISOString()}]);
    setLoading(true);
    const savedTxt=txt, savedFile=file;
    setInput(""); setFile(null);
    try {
      let res;
      if (savedFile) {
        const fd=new FormData();
        fd.append("action","sendMessage");
        fd.append("sessionId",SESSION_ID);
        fd.append("chatInput",savedTxt||"Проанализируй этот файл");
        // Normalize file for mobile compatibility (iPhone HEIC/JPEG handling)
        let fileToSend = savedFile;
        if (savedFile.type === '' || savedFile.type === 'application/octet-stream') {
          // Mobile sometimes doesn't set MIME type correctly
          const ext = savedFile.name.split('.').pop().toLowerCase();
          const mimeMap = {jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',heic:'image/heic',pdf:'application/pdf',heif:'image/heif'};
          const mime = mimeMap[ext] || 'application/octet-stream';
          fileToSend = new File([savedFile], savedFile.name, {type: mime});
        }
        fd.append("files", fileToSend);
        res = await fetch(WEBHOOK, {method:"POST", body:fd});
      } else {
        res = await fetch(WEBHOOK, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action:"sendMessage",sessionId:SESSION_ID,chatInput:savedTxt})});
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const raw = data.output || data.text || "Получил ✅";
      const clean = raw.replace(/^=+/,'').trim();
      setMsgs(p=>{
        const updated = [...p, {role:"assistant", content:clean, timestamp: new Date().toISOString()}];
        // Save to GitHub in background
        saveChatToGitHub(updated);
        return updated;
      });
    } catch(e) {
      console.error('Chat error:', e);
      setMsgs(p=>{
        const updated = [...p, {role:"assistant", content:"Упс, что-то пошло не так. Попробуй ещё раз 🙏", timestamp: new Date().toISOString()}];
        saveChatToGitHub(updated);
        return updated;
      });
    }
    setLoading(false);
  };

  const onKey=(e)=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };
  const autoResize=(e)=>{
    e.target.style.height="auto";
    e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";
  };

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"flex-end",padding:"6px 14px 0"}}>
        <button onClick={clearChat} style={{
          background:"none",border:`0.5px solid ${C.border}`,borderRadius:8,
          padding:"4px 10px",fontSize:10,color:C.text4,cursor:"pointer",
          display:"flex",alignItems:"center",gap:4,
        }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.red;e.currentTarget.style.color=C.red;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.text4;}}
        >🗑 Очистить чат</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"6px 14px 8px"}}>
        {msgs.map((m,i)=><ChatBubble key={i} msg={m}/>)}
        {loading && <TypingDots/>}
        <div ref={endRef}/>
      </div>
      {file && (
        <div style={{margin:"0 14px 6px",padding:"8px 12px",background:C.card2,borderRadius:10,fontSize:12,color:C.teal,display:"flex",alignItems:"center",justifyContent:"space-between",border:`0.5px solid ${C.border}`}}>
          <span>📎 {file.name}</span>
          <button onClick={()=>setFile(null)} style={{background:"none",border:"none",color:C.text4,fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
      )}
      <div style={{padding:"8px 14px 16px",borderTop:`0.5px solid ${C.border}`,display:"flex",alignItems:"flex-end",gap:8,background:C.card}}>
        <button onClick={()=>fileRef.current?.click()} style={{
          width:38,height:38,borderRadius:"50%",border:`0.5px solid ${C.border}`,
          background:"transparent",color:C.text4,fontSize:18,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
        }}>📎</button>
        <input type="file" ref={fileRef} onChange={e=>{if(e.target.files[0])setFile(e.target.files[0]);e.target.value='';}} style={{display:"none"}} accept="image/*,.pdf,application/pdf"/>
        <div style={{flex:1,background:C.card2,borderRadius:20,border:`0.5px solid ${C.border}`,padding:"10px 14px",display:"flex",alignItems:"flex-end"}}>
          <textarea
            ref={textRef}
            value={input}
            onChange={e=>{setInput(e.target.value);autoResize(e);}}
            onKeyDown={onKey}
            placeholder="Напиши или скинь файл..."
            rows={1}
            style={{flex:1,fontSize:14,color:C.text,background:"transparent",maxHeight:100,overflowY:"auto",lineHeight:1.4}}
          />
        </div>
        <button onClick={send} disabled={loading||(!input.trim()&&!file)} style={{
          width:38,height:38,borderRadius:"50%",border:"none",flexShrink:0,
          background:(input.trim()||file)&&!loading?`linear-gradient(135deg,${C.teal3},${C.teal})`:`${C.border}`,
          color:(input.trim()||file)&&!loading?C.darkText:C.text5,
          cursor:(input.trim()||file)&&!loading?"pointer":"not-allowed",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
          transition:"all .2s",
        }}>➤</button>
      </div>
    </div>
  );
}

      }}>
        {navItems.map(it=>(
          <button key={it.id} onClick={()=>setTab(it.id)} style={{
            flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
            padding:"6px 0",background:"none",border:"none",cursor:"pointer",
          }}>
            <div style={{
              fontSize:22,transition:"all .2s",
              filter:tab===it.id?"none":"grayscale(1) opacity(.35)",
              transform:tab===it.id?"scale(1.1)":"scale(1)",
            }}>{it.icon}</div>
            <div style={{
              fontSize:10,fontWeight:tab===it.id?600:400,
              color:tab===it.id?C.teal:C.text4,
              transition:"all .2s",
            }}>{it.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
