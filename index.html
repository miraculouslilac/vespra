<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#050f0f; font-family:'DM Sans',sans-serif; color:#e8f5f5; overflow:hidden; }
#root { height:100%; }
::-webkit-scrollbar { width:0; height:0; }
textarea { resize:none; outline:none; border:none; font-family:'DM Sans',sans-serif; }
button, input { font-family:'DM Sans',sans-serif; outline:none; -webkit-appearance:none; }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fillBar { from{width:0} }
@keyframes scoreCount { from{opacity:0} to{opacity:1} }
@keyframes pulse1 { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.4);opacity:.15} }
@keyframes pulse2 { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.7);opacity:.1} }
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes dotBounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

.fade-up { animation:fadeUp .3s ease forwards; }
.bar-fill { animation:fillBar 1s ease-out forwards; }
.msg-in { animation:msgIn .25s ease forwards; }
</style>

const TOTAL_SCORE = 72;

function statusColor(s) {
  if (s==="норма") return C.teal;
  if (s==="внимание") return C.amber;
  return C.red;
}

function ScoreRing({score}) {
  const [disp, setDisp] = React.useState(0);
  React.useEffect(()=>{
    let start=null, dur=1200;
    const step=(ts)=>{
      if(!start) start=ts;
      const p=Math.min((ts-start)/dur,1);
      const e=1-Math.pow(1-p,3);
      setDisp(Math.round(e*score));
      if(p<1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },[score]);

  const r=46, circ=2*Math.PI*r;
  const fill=(score/100)*circ;
  const offset=circ-fill;

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 0 10px"}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r={r} fill="none" stroke={C.card2} strokeWidth="9"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={C.teal} strokeWidth="9"
          strokeDasharray={`${fill} ${circ-fill}`} strokeLinecap="round"
          transform="rotate(-90 60 60)" opacity="0.95"/>
        <text x="60" y="60" textAnchor="middle" dominantBaseline="central"
          fontSize="34" fontWeight="700" fill={C.teal} fontFamily="DM Sans,sans-serif">{disp}</text>
      </svg>
      <div style={{fontSize:12,fontWeight:600,color:C.teal,marginTop:4,letterSpacing:0.2}}>
        {score>=80?"Отличный уровень":score>=65?"Хороший уровень":score>=50?"Средний уровень":"Низкий уровень"}
      </div>
    </div>
  );
}

function SystemRow({sys, onClick, delay}) {
  return (

      onMouseEnter={e=>e.currentTarget.style.opacity="0.7"}
      onMouseLeave={e=>e.currentTarget.style.opacity="1"}
    >
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <div style={{fontSize:11,color:C.text2,display:"flex",alignItems:"center",gap:5}}>
          <span>{sys.icon}</span> {sys.name}
        </div>
        <div style={{fontSize:11,fontWeight:700,color:sys.color}}>{sys.score}</div>
      </div>
      <div style={{background:C.card2,borderRadius:4,height:5,overflow:"hidden"}}>

          width:`${sys.score}%`,height:5,borderRadius:4,
          background:`linear-gradient(90deg,${sys.grad[0]},${sys.grad[1]})`,
          animationDelay:`${delay}s`
        }}/>
      </div>
    </div>
  );
}

        {/* Insight */}

function ChatBubble({msg}) {
  const isUser = msg.role==="user";
  return (
    <div className="msg-in" style={{display:"flex",justifyContent:isUser?"flex-end":"flex-start",marginBottom:10}}>
      {!isUser && (
        <div style={{
          width:28,height:28,borderRadius:"50%",flexShrink:0,marginRight:8,alignSelf:"flex-end",
          background:`linear-gradient(135deg,${C.teal3},${C.teal})`,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,
        }}>V</div>
      )}
      <div style={{
        maxWidth:"78%",padding:"10px 14px",
        borderRadius:isUser?"18px 18px 4px 18px":"18px 18px 18px 4px",
        background:isUser?`linear-gradient(135deg,${C.teal3},${C.teal})`:C.card2,
        color:isUser?C.darkText:C.text2,
        fontSize:13.5,lineHeight:1.55,
        border:isUser?"none":`0.5px solid ${C.border}`,
        whiteSpace:"pre-wrap",wordBreak:"break-word",
      }}
        dangerouslySetInnerHTML={{__html:msg.content.replace(/<a /g,'<a style="color:inherit;text-decoration:underline;" ')}}
      />
    </div>
  );
}

function TypingDots() {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal3},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>V</div>
      <div style={{background:C.card2,border:`0.5px solid ${C.border}`,borderRadius:"18px 18px 18px 4px",padding:"10px 14px",display:"flex",gap:5}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.teal,animation:`dotBounce 1.4s ease-in-out ${i*0.2}s infinite`}}/>
        ))}
      </div>
    </div>
  );
}

function ChatTab() {
  const [msgs, setMsgs] = React.useState([
    {role:"assistant",content:"Привет! Я Vespra 👋\nТвой персональный агент здоровья. Расскажи как себя чувствуешь, или скинь анализы, фото еды, тренировки — я всё проанализирую."}
  ]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [file, setFile] = React.useState(null);
  const endRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const textRef = React.useRef(null);

  React.useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);

  const send = async() => {
    const txt = input.trim();
    if (!txt && !file) return;
    setMsgs(p=>[...p,{role:"user",content:file?`📎 ${file.name}${txt?" — "+txt:""}`:txt}]);
    setLoading(true);
    const savedTxt=txt, savedFile=file;
    setInput(""); setFile(null);
    try {
      let res;
      if (savedFile) {
        const fd=new FormData();
        fd.append("action","sendMessage");
        fd.append("sessionId",SESSION_ID);
        fd.append("chatInput",savedTxt||"Проанализируй этот файл");
        fd.append("files",savedFile);
        res=await fetch(WEBHOOK,{method:"POST",body:fd});
      } else {
        res=await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"sendMessage",sessionId:SESSION_ID,chatInput:savedTxt})});
      }
      const data=await res.json();
      const raw = data.output||data.text||"Получил ✅";
      const clean = raw.replace(/^=+/,'').trim();
      setMsgs(p=>[...p,{role:"assistant",content:clean}]);
    } catch(e) {
      setMsgs(p=>[...p,{role:"assistant",content:"Упс, что-то пошло не так 🙏"}]);
    }
    setLoading(false);
  };

  const onKey=(e)=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };

  const autoResize=(e)=>{
    e.target.style.height="auto";
    e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";
  };

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px 8px"}}>
        {msgs.map((m,i)=><ChatBubble key={i} msg={m}/>)}
        {loading && <TypingDots/>}
        <div ref={endRef}/>
      </div>

      {/* File preview */}
      {file && (
        <div style={{margin:"0 14px 6px",padding:"8px 12px",background:C.card2,borderRadius:10,fontSize:12,color:C.teal,display:"flex",alignItems:"center",justifyContent:"space-between",border:`0.5px solid ${C.border}`}}>
          <span>📎 {file.name}</span>
          <button onClick={()=>setFile(null)} style={{background:"none",border:"none",color:C.text4,fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
      )}

      {/* Input bar */}
      <div style={{padding:"8px 14px 16px",borderTop:`0.5px solid ${C.border}`,display:"flex",alignItems:"flex-end",gap:8,background:C.card}}>
        <button onClick={()=>fileRef.current?.click()} style={{
          width:38,height:38,borderRadius:"50%",border:`0.5px solid ${C.border}`,
          background:"transparent",color:C.text4,fontSize:18,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
        }}>📎</button>
        <input type="file" ref={fileRef} onChange={e=>setFile(e.target.files[0])} style={{display:"none"}} accept="image/*,.pdf"/>

        <div style={{flex:1,background:C.card2,borderRadius:20,border:`0.5px solid ${C.border}`,padding:"10px 14px",display:"flex",alignItems:"flex-end"}}>
          <textarea
            ref={textRef}
            value={input}
            onChange={e=>{setInput(e.target.value);autoResize(e);}}
            onKeyDown={onKey}
            placeholder="Напиши или скинь файл..."
            rows={1}
            style={{flex:1,fontSize:14,color:C.text,background:"transparent",maxHeight:100,overflowY:"auto",lineHeight:1.4}}
          />
        </div>

        <button onClick={send} disabled={loading||(!input.trim()&&!file)} style={{
          width:38,height:38,borderRadius:"50%",border:"none",flexShrink:0,
          background:(input.trim()||file)&&!loading?`linear-gradient(135deg,${C.teal3},${C.teal})`:`${C.border}`,
          color:(input.trim()||file)&&!loading?C.darkText:C.text5,
          cursor:(input.trim()||file)&&!loading?"pointer":"not-allowed",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
          transition:"all .2s",
        }}>➤</button>
      </div>
    </div>
  );
}

function ProfileTab() {
  const fields=[
    {icon:"🎂",label:"Возраст",val:"—"},
    {icon:"📏",label:"Рост",val:"—"},
    {icon:"⚖️",label:"Вес",val:"—"},
    {icon:"🏃",label:"Уровень активности",val:"—"},
    {icon:"🔥",label:"Норма калорий",val:"—"},
    {icon:"⌚",label:"Носимое устройство",val:"—"},
  ];
  return (
    <div style={{flex:1,overflowY:"auto",padding:"16px 16px 80px"}} className="fade-up">
      {/* Avatar */}
      <div style={{
        background:`linear-gradient(135deg,${C.teal3},${C.purple})`,
        borderRadius:20,padding:24,marginBottom:16,textAlign:"center",
      }}>
        <div style={{
          width:64,height:64,borderRadius:"50%",
          background:"rgba(0,0,0,0.2)",margin:"0 auto 10px",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,
        }}>👤</div>
        <div style={{fontSize:18,fontWeight:700,color:"#fff"}}>Пользователь</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginTop:3}}>Участник Vespra</div>
      </div>

      {/* Fields */}
      {fields.map(f=>(
        <div key={f.label} style={{
          display:"flex",alignItems:"center",padding:"13px 0",
          borderBottom:`0.5px solid ${C.card2}`,
        }}>
          <div style={{fontSize:18,width:32,flexShrink:0}}>{f.icon}</div>
          <div style={{flex:1,fontSize:13,color:C.text3,fontWeight:500}}>{f.label}</div>
          <div style={{fontSize:13,color:C.text4}}>{f.val}</div>
        </div>
      ))}

      <div style={{
        marginTop:16,background:C.card2,borderRadius:14,
        padding:"12px 14px",border:`0.5px solid ${C.border}`,
        fontSize:12,color:C.text3,lineHeight:1.6,
      }}>
        💡 Напиши "привет" в чате — Vespra задаст несколько вопросов и заполнит профиль автоматически.
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState("chat");

  const todayStr = new Date().toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"});

  const navItems=[
    {id:"chat",icon:"💬",label:"Чат"},
    {id:"health",icon:"🫀",label:"Здоровье"},
    {id:"profile",icon:"👤",label:"Профиль"},
  ];

  return (
    <div style={{
      height:"100%",display:"flex",flexDirection:"column",
      background:C.card,maxWidth:430,margin:"0 auto",
      position:"relative",
    }}>
      {/* Header */}
      <div style={{
        padding:"48px 18px 12px",
        borderBottom:`0.5px solid ${C.border}`,
        flexShrink:0,
        background:C.card,
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:C.text4,letterSpacing:0.4,textTransform:"capitalize",marginBottom:2}}>{todayStr}</div>
            <div style={{fontSize:20,fontWeight:700,color:C.teal,letterSpacing:-0.5}}>
              Vesp<span style={{color:C.purple}}>ra</span>
              <span style={{
                display:"inline-block",width:7,height:7,borderRadius:"50%",
                background:C.teal,marginLeft:6,verticalAlign:"middle",
                boxShadow:`0 0 0 2px ${C.teal}33`,
              }}/>
            </div>
          </div>
          <div style={{
            width:36,height:36,borderRadius:"50%",
            background:`linear-gradient(135deg,${C.teal3},${C.purple})`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:16,
          }}>🌿</div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="chat" && <ChatTab/>}
        {tab==="health" && <HealthTab/>}
        {tab==="profile" && <ProfileTab/>}
      </div>

      {/* Bottom nav */}
      <div style={{
        display:"flex",
        background:"rgba(10,26,26,0.97)",
        backdropFilter:"blur(20px)",
        borderTop:`0.5px solid ${C.border}`,
        padding:"8px 0 22px",
        flexShrink:0,
      }}>
        {navItems.map(it=>(
          <button key={it.id} onClick={()=>setTab(it.id)} style={{
            flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
            padding:"6px 0",background:"none",border:"none",cursor:"pointer",
          }}>
            <div style={{
              fontSize:22,transition:"all .2s",
              filter:tab===it.id?"none":"grayscale(1) opacity(.35)",
              transform:tab===it.id?"scale(1.1)":"scale(1)",
            }}>{it.icon}</div>
            <div style={{
              fontSize:10,fontWeight:tab===it.id?600:400,
              color:tab===it.id?C.teal:C.text4,
              transition:"all .2s",
            }}>{it.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
